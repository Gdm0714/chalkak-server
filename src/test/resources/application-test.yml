spring:
  # H2 Database for Testing
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        
  cache:
    type: simple
    
logging:
  level:
    com.min.chalkakserver: DEBUG
    org.springframework.cache: DEBUG

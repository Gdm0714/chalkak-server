name: Auto Label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label based on title/body
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const labels = [];

            if (title.includes('bug') || title.includes('error') || title.includes('crash') ||
                title.includes('broken') || title.includes('fail') || title.includes('not working')) {
              labels.push('bug');
            }

            if (title.includes('feature') || title.includes('request') || title.includes('add') ||
                title.includes('enhancement') || title.includes('suggestion')) {
              labels.push('enhancement');
            }

            if (title.includes('how') || title.includes('?') || title.includes('question') ||
                title.includes('help')) {
              labels.push('question');
            }

            if (title.includes('doc') || title.includes('readme') || title.includes('typo')) {
              labels.push('documentation');
            }

            if (body.includes('auth') || body.includes('jwt') || body.includes('login') ||
                body.includes('token')) {
              labels.push('auth');
            }

            if (body.includes('cache') || body.includes('redis')) {
              labels.push('cache');
            }

            if (body.includes('congestion') || body.includes('혼잡도')) {
              labels.push('congestion');
            }

            if (body.includes('deploy') || body.includes('ci') || body.includes('cd') ||
                body.includes('github actions')) {
              labels.push('devops');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }
